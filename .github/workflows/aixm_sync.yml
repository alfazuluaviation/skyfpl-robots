name: "🛰️ SkyFPL - Robô Processador de Espaços Aéreos (AIXM 5.1)"

on:
  workflow_dispatch: # Permite disparar manualmente via API/Dashboard
  schedule:
    - cron: '0 0 * * 1' # Roda toda segunda-feira à meia-noite

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd aixm-airspaces
          npm install

      - name: Run AIXM Extractor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd aixm-airspaces
          node extractor.mjs
