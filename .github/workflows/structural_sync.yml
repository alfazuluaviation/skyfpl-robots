name: "🛰️ SkyFPL - Robô Processador de Espaços Aéreos Estruturais"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aixm-airspaces/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber urllib3 supabase

      - name: Install Node Dependencies
        run: |
          cd aixm-airspaces
          npm install

      - name: Run AIP Frequency Extractor (Híbrido)
        run: |
          cd aixm-airspaces
          python aip_frequency_extractor.py

      - name: Run Structural Extractor
        run: |
          cd aixm-airspaces
          node structural_extractor.mjs
