name: "🛰️ SkyFPL - Robô Processador de Espaços Aéreos Estruturais"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aixm-airspaces/package-lock.json

      - name: Install Dependencies
        run: |
          cd aixm-airspaces
          npm install

      - name: Run Structural Extractor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd aixm-airspaces
          node structural_extractor.mjs
